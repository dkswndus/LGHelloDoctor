<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LG HelloDoctor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page">

    <!-- 헤더 -->
    <header class="header">
      <div class="logo-row">
        <span class="logo-badge">LG</span>
        <span class="logo-text">HelloDoctor</span>
      </div>
      <p class="subtitle">말씀하시면 가까운 병원을 안내해 드립니다</p>
    </header>

    <!-- 메인 -->
    <main class="main">

      <!-- 녹음 카드 -->
      <section class="record-section">
        <div class="record-card">
          <button id="recordBtn" class="record-btn" aria-label="녹음 시작">
            <svg class="mic-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="9" y="2" width="6" height="12" rx="3" fill="white" />
              <path d="M5 10a7 7 0 0 0 14 0" stroke="white" stroke-width="2.2" stroke-linecap="round" />
              <line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2.2" stroke-linecap="round" />
              <line x1="8" y1="21" x2="16" y2="21" stroke="white" stroke-width="2.2" stroke-linecap="round" />
            </svg>
            <span id="recordLabel">말하기</span>
          </button>
          <p id="recordStatus" class="status-text"></p>
          <p class="record-hint">버튼을 누르고 증상을 말씀해 주세요<br />다시 누르면 분석을 시작합니다</p>
        </div>
      </section>

      <!-- 로딩 -->
      <section id="loadingSection" class="loading-section hidden">
        <div class="spinner"></div>
        <p>증상을 분석하고 있습니다…</p>
      </section>

      <!-- 결과 -->
      <section id="resultSection" class="result-section hidden">

        <div class="result-card">
          <div class="card-icon">
            <span class="card-icon-dot"></span>
            <span class="card-label">인식된 내용</span>
          </div>
          <p id="transcriptText" class="card-body"></p>
        </div>

        <div class="result-card card-highlight">
          <div class="card-icon">
            <span class="card-icon-dot"></span>
            <span class="card-label">안내</span>
          </div>
          <p id="assistantText" class="card-body"></p>
        </div>

        <div id="hospitalCard" class="result-card card-hospital hidden">
          <div class="card-icon">
            <span class="card-icon-dot"></span>
            <span class="card-label">근처 병원</span>
          </div>
          <p id="hospitalName" class="hospital-name"></p>
          <p id="hospitalAddress" class="hospital-detail"></p>
          <p id="hospitalPhone" class="hospital-detail"></p>
        </div>

        <button id="replayBtn" class="replay-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <polygon points="5,3 19,12 5,21" fill="currentColor" />
          </svg>
          다시 듣기
        </button>

      </section>

      <!-- 에러 -->
      <section id="errorSection" class="error-section hidden">
        <div class="error-icon">⚠️</div>
        <p id="errorText" class="error-msg"></p>
        <button class="error-retry-btn" onclick="resetUI()">다시 시도하기</button>
      </section>

    </main>
  </div>

  <audio id="audioPlayer" hidden></audio>
  <script src="app.js"></script>
</body>

</html>
